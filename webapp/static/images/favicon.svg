<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="emeraldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a4228;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d5e3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b342;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Ornate crest -->
  <path d="M50 2 L90 15 L90 55 Q90 95 50 98 Q10 95 10 55 L10 15 Z" 
        fill="url(#emeraldDark)" stroke="url(#gold)" stroke-width="1.5"/>
  
  <!-- Inner crest -->
  <path d="M50 12 L78 22 L78 52 Q78 82 50 86 Q22 82 22 52 L22 22 Z" 
        fill="#1a7a4a" opacity="0.25"/>

  <!-- Gold gear teeth -->
  <g stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round">
    <line x1="50" y1="16" x2="50" y2="13"/>
    <line x1="50" y1="84" x2="50" y2="87"/>
    <line x1="20" y1="50" x2="17" y2="50"/>
    <line x1="80" y1="50" x2="83" y2="50"/>
    <line x1="31" y1="31" x2="29" y2="29"/>
    <line x1="69" y1="31" x2="71" y2="29"/>
    <line x1="31" y1="69" x2="29" y2="71"/>
    <line x1="69" y1="69" x2="71" y2="71"/>
  </g>

  <!-- Vault dial ring -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="16" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Dial tick marks -->
  <g stroke="#f5b342" stroke-width="1.5" stroke-linecap="round">
    <line x1="50" y1="28" x2="50" y2="24"/>
    <line x1="50" y1="72" x2="50" y2="76"/>
    <line x1="28" y1="50" x2="24" y2="50"/>
    <line x1="72" y1="50" x2="76" y2="50"/>
  </g>

  <!-- Dial center -->
  <circle cx="50" cy="50" r="8" fill="url(#gold)" opacity="0.7"/>
  <circle cx="50" cy="50" r="3.5" fill="#0a4228"/>
  
  <!-- Keyhole -->
  <g transform="translate(50, 47)">
    <circle cx="0" cy="-3" r="3" fill="url(#gold)"/>
    <path d="M-2 1 L-2 8 Q-2 10 0 10 Q2 10 2 8 L2 1 Z" fill="url(#gold)"/>
  </g>

  <!-- Checkmark -->
  <path d="M44 52 L47 56 L56 46" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gold sparkle -->
  <polygon points="22,28 24,26 26,28 24,30" fill="#f5b342" opacity="0.5"/>
  <polygon points="78,28 80,26 82,28 80,30" fill="#f5b342" opacity="0.5"/>
</svg>