<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220">
  <defs>
    <linearGradient id="emeraldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a4228;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d5e3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a7a4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emeraldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d8a4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8960e;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#d4a017;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#e8b830;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b342;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b830;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7cc5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b342;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="creamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf7f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0ebe0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0a4228" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="1" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>

  <!-- ===== ICON: Ornate Crest/Badge with Detailed Vault ===== -->
  <g transform="translate(5, 5)" filter="url(#shadow)">
    
    <!-- Ornate crest outer border (decorative shield shape) -->
    <path d="M90 5 L160 5 L175 18 L175 70 Q175 135 120 170 Q85 188 40 170 Q5 145 5 95 L5 18 L20 5 Z" 
          fill="url(#emeraldDark)" stroke="url(#gold)" stroke-width="2"/>
    
    <!-- Inner crest border -->
    <path d="M90 18 L150 18 L162 28 L162 70 Q162 125 120 155 Q85 170 50 155 Q18 130 18 85 L18 28 L30 18 Z" 
          fill="url(#emeraldLight)" opacity="0.3"/>

    <!-- Gold filigree scrollwork top left -->
    <path d="M25 25 Q35 18 40 28 Q45 38 35 42 Q28 45 25 38" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
    <path d="M155 25 Q145 18 140 28 Q135 38 145 42 Q152 45 155 38" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>

    <!-- Gold filigree scrollwork bottom -->
    <path d="M30 140 Q40 148 50 142 Q60 136 55 128" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.5"/>
    <path d="M150 140 Q140 148 130 142 Q120 136 125 128" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.5"/>

    <!-- Small decorative diamonds top -->
    <polygon points="90,24 94,28 90,32 86,28" fill="url(#gold)" opacity="0.7"/>
    <polygon points="110,24 114,28 110,32 106,28" fill="url(#gold)" opacity="0.7"/>
    <polygon points="70,24 74,28 70,32 66,28" fill="url(#gold)" opacity="0.7"/>

    <!-- === Vault Door Assembly === -->
    
    <!-- Vault door outer ring with gear teeth -->
    <circle cx="90" cy="88" r="48" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
    <circle cx="90" cy="88" r="43" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
    
    <!-- Gear teeth around outer ring -->
    <g stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round">
      <line x1="90" y1="38" x2="90" y2="33"/>
      <line x1="90" y1="138" x2="90" y2="143"/>
      <line x1="42" y1="88" x2="37" y2="88"/>
      <line x1="138" y1="88" x2="143" y2="88"/>
      <line x1="56" y1="54" x2="52" y2="50"/>
      <line x1="124" y1="54" x2="128" y2="50"/>
      <line x1="56" y1="122" x2="52" y2="126"/>
      <line x1="124" y1="122" x2="128" y2="126"/>
      <!-- Additional teeth -->
      <line x1="68" y1="42" x2="65" y2="37"/>
      <line x1="112" y1="42" x2="115" y2="37"/>
      <line x1="68" y1="134" x2="65" y2="139"/>
      <line x1="112" y1="134" x2="115" y2="139"/>
      <line x1="46" y1="68" x2="41" y2="65"/>
      <line x1="46" y1="108" x2="41" y2="111"/>
      <line x1="134" y1="68" x2="139" y2="65"/>
      <line x1="134" y1="108" x2="139" y2="111"/>
    </g>

    <!-- Second ring -->
    <circle cx="90" cy="88" r="35" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
    <circle cx="90" cy="88" r="33" fill="none" stroke="url(#goldShine)" stroke-width="1" opacity="0.3"/>

    <!-- Vault dial main circle -->
    <circle cx="90" cy="88" r="24" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="90" cy="88" r="20" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Dial tick marks (detailed) -->
    <g stroke="url(#goldShine)" stroke-width="2" stroke-linecap="round">
      <line x1="90" y1="64" x2="90" y2="57"/>
      <line x1="90" y1="112" x2="90" y2="119"/>
      <line x1="66" y1="88" x2="59" y2="88"/>
      <line x1="114" y1="88" x2="121" y2="88"/>
      <line x1="73" y1="71" x2="68" y2="66"/>
      <line x1="107" y1="71" x2="112" y2="66"/>
      <line x1="73" y1="105" x2="68" y2="110"/>
      <line x1="107" y1="105" x2="112" y2="110"/>
    </g>

    <!-- Dial pointer/needle -->
    <line x1="90" y1="88" x2="75" y2="73" stroke="url(#goldShine)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="75" cy="73" r="3" fill="url(#goldShine)"/>

    <!-- Inner dial center hub -->
    <circle cx="90" cy="88" r="8" fill="url(#gold)" opacity="0.8"/>
    <circle cx="90" cy="88" r="4" fill="#0a4228"/>
    <circle cx="90" cy="88" r="2" fill="url(#gold)"/>

    <!-- === Ornate Keyhole === -->
    <g transform="translate(90, 82)">
      <circle cx="0" cy="-3" r="4.5" fill="url(#gold)"/>
      <path d="M-3 1 L-3 12 Q-3 15 0 15 Q3 15 3 12 L3 1 Z" fill="url(#gold)"/>
      <!-- Decorative keyhole top notch -->
      <path d="M-1 -7 L0 -10 L1 -7" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- === Key element (subtle, crossing diagonally) === -->
    <g transform="translate(60, 105) rotate(-35)" opacity="0.4">
      <!-- Key shaft -->
      <rect x="0" y="-2" width="28" height="4" rx="2" fill="url(#gold)"/>
      <!-- Key bow (circle) -->
      <circle cx="-6" cy="0" r="7" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
      <!-- Key teeth -->
      <rect x="20" y="-2" width="3" height="6" rx="1" fill="url(#gold)"/>
      <rect x="25" y="-2" width="3" height="4" rx="1" fill="url(#gold)"/>
    </g>

    <!-- Approved checkmark -->
    <path d="M72 104 L78 110 L92 93" fill="none" stroke="#4ade80" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" filter="url(#innerGlow)"/>

    <!-- Gold sparkle accents -->
    <g fill="url(#goldShine)" opacity="0.5">
      <polygon points="35,55 37,53 39,55 37,57"/>
      <polygon points="145,55 147,53 149,55 147,57"/>
      <polygon points="35,118 37,116 39,118 37,120"/>
      <polygon points="145,118 147,116 149,118 147,120"/>
    </g>
  </g>

  <!-- ===== WORDMARK (More Distinctive) ===== -->
  <g transform="translate(205, 58)">
    <!-- "Claim" - dark charcoal, lighter weight -->
    <text x="0" y="0" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-size="48" font-weight="700" fill="#1a1a2e" letter-spacing="-1.5">
      Claim
    </text>
    
    <!-- "Vault" - emerald, heavier weight, more prominent -->
    <text x="0" y="48" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-size="52" font-weight="800" fill="#0d5e3a" letter-spacing="-1">
      VAULT
    </text>
    
    <!-- Gold underline accent under "VAULT" -->
    <rect x="0" y="58" width="120" height="3" rx="1.5" fill="url(#gold)"/>

    <!-- "AI" — Gold integrated badge, connected to the underline -->
    <g transform="translate(130, 6)">
      <rect x="0" y="-4" width="52" height="38" rx="8" fill="url(#gold)"/>
      <rect x="2" y="-2" width="48" height="34" rx="7" fill="none" stroke="#1a1a2e" stroke-width="1" opacity="0.15"/>
      <text x="7" y="24" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-size="22" font-weight="800" fill="#1a1a2e" letter-spacing="1.5">AI</text>
      <!-- Small sparkle in AI badge -->
      <polygon points="40,6 42,4 44,6 42,8" fill="#1a1a2e" opacity="0.3"/>
    </g>

    <!-- Tagline -->
    <text x="0" y="82" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#88847a" letter-spacing="4.5">
      RECLAIM WHAT'S YOURS
    </text>
  </g>
</svg>