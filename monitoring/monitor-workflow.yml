name: Weekly Monitoring Search

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly at midnight Sunday
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          cd chrome-pilot && npm install
          npx playwright install chromium

      - name: Launch Chrome with Remote Debugging (for CDP)
        run: |
          google-chrome --remote-debugging-port=9222 --headless --no-sandbox &
          sleep 5

      - name: Run Monitoring Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Email service keys if integrated here
        run: node monitor.js
